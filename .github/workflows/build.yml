name: Build PStream IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show all files
        run: |
          find . -name "*.xcodeproj" -type d
          echo "---"
          ls -la
          echo "---"
          ls -la PStream/ || echo "No PStream folder"
