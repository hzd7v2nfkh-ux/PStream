name: Build PStream IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show schemes
        run: |
          xcodebuild -project PStream/PStream.xcodeproj -list

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project PStream/PStream.xcodeproj \
            -scheme PStream \
            -archivePath $PWD/build/PStream.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: PStream-IPA
          path: build/PStream.xcarchive
