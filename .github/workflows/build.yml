name: Build PStream IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Resize icon
        run: |
          sips -z 1024 1024 PStream/Assets.xcassets/AppIcon.appiconset/icon.jpg

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project PStream.xcodeproj \
            -scheme PStream \
            -archivePath $PWD/build/PStream.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            EXCLUDED_ARCHS="" \
            -allowProvisioningUpdates 2>&1 | grep -v "simulator runtime" || true

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/PStream.xcarchive/Products/Applications/PStream.app build/Payload/
          cd build && zip -r PStream.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PStream-IPA
          path: build/PStream.ipa
